<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page_title">溫馨住宅出租</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F0E6; --warm-white: #FDFAF5; --wood-light: #C8A97A; --wood-mid: #A07850;
    --wood-dark: #6B4F35; --bark: #3D2B1F; --sage: #8A9E8C; --rust: #C4622D;
    --text-main: #2C1F14; --text-sub: #7A6355; --shadow: rgba(60,35,10,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--warm-white); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
  nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 5%; background: rgba(253,250,245,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(200,169,122,0.2); transition: 0.3s; }
  .nav-logo { font-family: 'Noto Serif TC', serif; font-size: 1.35rem; font-weight: 700; color: var(--wood-dark); }
  .nav-cta { background: var(--wood-dark); color: var(--cream); padding: 8px 20px; border-radius: 40px; text-decoration: none; font-size: 0.85rem; }
  .hero { min-height: 100vh; display: flex; align-items: center; padding: 120px 5% 60px; background: var(--cream); position: relative; }
  .hero-content { max-width: 600px; z-index: 2; animation: fadeUp 1s ease forwards; }
  .hero h1 { font-family: 'Noto Serif TC', serif; font-size: 3.5rem; color: var(--bark); margin-bottom: 20px; line-height: 1.2; }
  .hero h1 em { color: var(--rust); font-style: normal; }
  .hero-desc { font-size: 1.1rem; color: var(--text-sub); margin-bottom: 30px; }
  .btn-primary { display: inline-block; background: var(--wood-dark); color: var(--cream); padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 500; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .btn-primary:hover { background: var(--rust); transform: translateY(-3px); }
  
  /* 原廠相片欣賞區塊 (Gallery) */
  #gallery { background: var(--bark); padding: 80px 0; color: var(--cream); }
  .section-title { font-family: 'Noto Serif TC', serif; font-size: 2.4rem; color: var(--cream); text-align: center; margin-bottom: 40px; }
  .carousel-wrap { position: relative; overflow: hidden; width: 80%; margin: 0 auto; max-width: 1000px; }
  .carousel-track { display: flex; transition: transform .55s ease; }
  .carousel-slide { min-width: 100%; height: 500px; position: relative; }
  .carousel-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .slide-caption { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); color: white; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 1.2rem; }
  .prev { left: 10px; } .next { right: 10px; }
  
  /* 租屋資訊區塊 (Info) */
  #info { padding: 80px 5%; background: var(--warm-white); }
  .info-table { border: 1px solid var(--wood-light); border-radius: 12px; overflow: hidden; margin: 30px 0; max-width: 800px; margin-left: auto; margin-right: auto; }
  .info-row { display: flex; border-bottom: 1px solid rgba(200,169,122,0.2); }
  .info-key { width: 30%; background: var(--wood-dark); color: var(--cream); padding: 15px; font-size: 0.9rem; }
  .info-val { flex: 1; padding: 15px; background: white; }
  .price-area { text-align: center; margin-top: 20px; }
  .price-highlight { font-size: 3rem; color: var(--rust); font-weight: 700; font-family: 'Noto Serif TC', serif; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">溫居 <span>・</span> 住宅出租</div>
  <a href="#info" class="nav-cta">查看資訊</a>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 id="site_title">讀取中...</h1>
    <p class="hero-desc" id="site_description">正在連接後台資料...</p>
    <a href="#gallery" class="btn-primary">瀏覽相片</a>
  </div>
</section>

<section id="gallery">
  <h2 class="section-title">精選相片欣賞</h2>
  <div class="carousel-wrap">
    <div class="carousel-track" id="photo_track">
      </div>
    <button class="carousel-btn prev" id="prevBtn">&#10094;</button>
    <button class="carousel-btn next" id="nextBtn">&#10095;</button>
  </div>
</section>

<section id="info">
  <h2 style="font-family:'Noto Serif TC'; text-align:center;">租屋詳細資訊</h2>
  <div class="info-table">
    <div class="info-row">
      <div class="info-key">房屋地址</div>
      <div class="info-val" id="info_address">載入中...</div>
    </div>
    <div class="info-row">
      <div class="info-key">月租金</div>
      <div class="info-val" id="info_price_row">NT$ --</div>
    </div>
  </div>
  <div class="price-area">
    <div class="price-highlight" id="info_price_display">NT$ --</div>
    <p style="color:var(--text-sub)">元 / 每月</p>
  </div>
</section>

<script>
  // ── 1. 自動讀取基本設定 (general.json) ──
  fetch('./data/general.json')
    .then(res => res.json())
    .then(data => {
      if(data.site_title) {
        document.getElementById('site_title').innerHTML = `<em>${data.site_title}</em><br>歡迎入住`;
        document.getElementById('page_title').innerText = data.site_title;
      }
      if(data.site_description) document.getElementById('site_description').innerText = data.site_description;
      if(data.address) document.getElementById('info_address').innerText = data.address;
      if(data.price) {
        document.getElementById('info_price_row').innerText = `NT$ ${data.price}`;
        document.getElementById('info_price_display').innerText = `NT$ ${data.price}`;
      }
    });

  // ── 2. 自動讀取相片管理 (data/photos/) ──
  // 由於 GitHub 無法動態列出資料夾，這需要一個技巧：
  // 假設你在後台新增的相片檔案名稱是固定的，或者你需要手動維護一個圖片列表。
  // 為了解決這個問題，我建立了一個動態載入的腳本，前提是你在後台新增的相片會自動生成在 data/photos 資料夾中。
  
  // NOTE: 這需要解析 Markdown 檔案，這裡使用一個簡化的 JavaScript Markdown 解析器
  
  async function loadPhotos() {
    const track = document.getElementById('photo_track');
    const response = await fetch('https://api.github.com/repos/active716/Ally-house/contents/data/photos');
    const files = await response.json();
    
    // 過濾出 .md 檔案
    const mdFiles = files.filter(file => file.name.endsWith('.md'));
    
    for (const file of mdFiles) {
      const contentRes = await fetch(file.download_url);
      const text = await contentRes.text();
      
      // 簡易解析 Markdown Frontmatter
      const titleMatch = text.match(/title: (.*)/);
      const imageMatch = text.match(/image: (.*)/);
      const descMatch = text.match(/description: (.*)/);
      
      if (imageMatch && imageMatch[1]) {
        const title = titleMatch ? titleMatch[1].replace(/"/g, '') : '';
        const imgUrl = imageMatch[1].replace(/"/g, '');
        const desc = descMatch ? descMatch[1].replace(/"/g, '') : '';
        
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `
          <img src="${imgUrl}" alt="${title}">
          <div class="slide-caption"><h3>${title}</h3><p>${desc}</p></div>
        `;
        track.appendChild(slide);
      }
    }
    
    // 初始化幻燈片控制器
    initCarousel();
  }

  // ── 3. 初始化原廠幻燈片控制器 ──
  function initCarousel() {
    const track = document.getElementById('photo_track');
    const slides = track.children;
    let current = 0;
    
    function goTo(n) {
      current = (n + slides.length) % slides.length;
      track.style.transform = `translateX(-${current * 100}%)`;
    }
    
    document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
    
    // 自動播放
    setInterval(() => goTo(current + 1), 5000);
  }

  // 啟動相片載入
  loadPhotos();
</script>

</body>
</html>
