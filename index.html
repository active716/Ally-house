<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page_title">溫馨住宅出租</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F0E6; --warm-white: #FDFAF5; --wood-light: #C8A97A; --wood-mid: #A07850;
    --wood-dark: #6B4F35; --bark: #3D2B1F; --sage: #8A9E8C; --rust: #C4622D;
    --text-main: #2C1F14; --text-sub: #7A6355; --shadow: rgba(60,35,10,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--warm-white); color: var(--text-main); line-height: 1.6; }
  nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 5%; background: rgba(253,250,245,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(200,169,122,0.2); }
  .nav-logo { font-family: 'Noto Serif TC', serif; font-size: 1.35rem; font-weight: 700; color: var(--wood-dark); }
  .nav-cta { background: var(--wood-dark); color: var(--cream); padding: 8px 20px; border-radius: 40px; text-decoration: none; font-size: 0.85rem; }
  .hero { min-height: 80vh; display: flex; align-items: center; padding: 120px 5% 60px; background: var(--cream); position: relative; }
  .hero-content { max-width: 600px; z-index: 2; animation: fadeUp 1s ease forwards; }
  .hero h1 { font-family: 'Noto Serif TC', serif; font-size: 3.5rem; color: var(--bark); margin-bottom: 20px; line-height: 1.2; }
  .hero h1 em { color: var(--rust); font-style: normal; }
  .hero-desc { font-size: 1.1rem; color: var(--text-sub); margin-bottom: 30px; }
  .btn-primary { display: inline-block; background: var(--wood-dark); color: var(--cream); padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 500; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .btn-primary:hover { background: var(--rust); transform: translateY(-3px); }
  #info { padding: 80px 5%; }
  .info-table { border: 1px solid var(--wood-light); border-radius: 12px; overflow: hidden; margin: 30px 0; }
  .info-row { display: flex; border-bottom: 1px solid rgba(200,169,122,0.2); }
  .info-key { width: 30%; background: var(--wood-dark); color: var(--cream); padding: 15px; font-size: 0.9rem; }
  .info-val { flex: 1; padding: 15px; background: white; }
  .price-area { margin-top: 20px; }
  .price-highlight { font-size: 3rem; color: var(--rust); font-weight: 700; font-family: 'Noto Serif TC', serif; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">溫居 <span>・</span> 住宅出租</div>
  <a href="#contact" class="nav-cta">預約看房</a>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 id="site_title">讀取中...</h1>
    <p class="hero-desc" id="site_description">正在連接後台資料...</p>
    <a href="#info" class="btn-primary">查看詳細資訊</a>
  </div>
</section>

<section id="info">
  <h2 style="font-family:'Noto Serif TC'; margin-bottom:20px;">租屋詳細資訊</h2>
  <div class="info-table">
    <div class="info-row">
      <div class="info-key">房屋地址</div>
      <div class="info-val" id="info_address">載入中...</div>
    </div>
    <div class="info-row">
      <div class="info-key">租金包含</div>
      <div class="info-val">管理費、清潔費</div>
    </div>
  </div>
  <div class="price-area">
    <div class="price-highlight" id="info_price">NT$ --</div>
    <p style="color:var(--text-sub)">元 / 每月</p>
  </div>
</section>

<script>
  // 從你的 GitHub 資料夾讀取 JSON
  fetch('./data/general.json')
    .then(res => res.json())
    .then(data => {
      // 1. 更新標題 (例如：六合館)
      if(data.site_title) {
        document.getElementById('site_title').innerHTML = `<em>${data.site_title}</em><br>歡迎入住`;
        document.getElementById('page_title').innerText = data.site_title;
      }
      // 2. 更新描述
      if(data.site_description) {
        document.getElementById('site_description').innerText = data.site_description;
      }
      // 3. 更新地址
      if(data.address) {
        document.getElementById('info_address').innerText = data.address;
      }
      // 4. 更新價格
      if(data.price) {
        document.getElementById('info_price').innerText = `NT$ ${data.price}`;
      }
    })
    .catch(err => {
      console.error("讀取失敗:", err);
      document.getElementById('site_title').innerText = "系統讀取中...";
    });
</script>

</body>
</html>
